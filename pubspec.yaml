name: interview_ace
description: "InterviewAce - AI Interview Coach Flutter App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  crypto: ^3.0.6

  # Architecture & DI
  get_it: ^8.0.0
  injectable: ^2.5.0
  equatable: ^2.0.7
  dartz: ^0.10.1

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4

  # Routing
  auto_route: ^9.2.2

  # Database (Drift)
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.0

  # Cache & Settings
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.4

  # Networking
  dio: ^5.7.0
  flutter_dotenv: ^5.2.1

  # JSON Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ML Kit
  google_mlkit_text_recognition: ^0.14.0
  google_mlkit_face_detection: ^0.12.0
  image_picker: ^1.1.2
  camera: ^0.11.0+2

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.69.2
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  uuid: ^4.5.1

  # Voice
  speech_to_text: ^7.0.0
  lottie: ^3.3.2
  file_picker: ^10.3.10
  photo_manager: ^3.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.13
  auto_route_generator: ^9.0.0
  injectable_generator: ^2.7.0
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.22.1
  # Testing
  mocktail: ^1.0.4
  bloc_test: ^9.1.7

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
